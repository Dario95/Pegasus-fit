@if (!enLanding()) {
  <header class="px-4 pt-3 pb-1 flex items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2 no-underline text-texto">
      <img src="avatar.png" alt="" class="w-8 h-8 rounded-full" />
      <span class="wordmark text-xl font-black tracking-tight">PEGASUS<em>FIT</em></span>
    </a>
    @if (!auth.usuario()) {
      <a routerLink="/login" class="text-xs text-apagado no-underline border border-borde rounded-full px-3 py-1.5">
        Iniciar sesión
      </a>
    }
  </header>
}

<main class="flex-1 overflow-y-auto" [class.p-4]="!enLanding()">
  <router-outlet />
</main>

@if (!enLanding()) {
  <nav class="flex border-t border-borde bg-panel pb-[env(safe-area-inset-bottom)]">
    <a routerLink="/rutina" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="bolt" clase="w-6 h-6" /><span>Rutina</span>
    </a>
    <a routerLink="/dieta" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="pastel" clase="w-6 h-6" /><span>Dieta</span>
    </a>
    <a routerLink="/perfil" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="usuario" clase="w-6 h-6" /><span>Perfil</span>
    </a>
  </nav>
}
