@if (!enLanding()) {
  <header class="px-4 pt-3 pb-1">
    <a routerLink="/" class="wordmark text-xl font-black tracking-tight no-underline text-texto">PEGASUS<em>FIT</em></a>
  </header>
}

<main class="flex-1 overflow-y-auto" [class.p-4]="!enLanding()">
  <router-outlet />
</main>

@if (!enLanding()) {
  <nav class="flex border-t border-borde bg-panel pb-[env(safe-area-inset-bottom)]">
    <a routerLink="/rutina" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="bolt" clase="w-6 h-6" /><span>Rutina</span>
    </a>
    <a routerLink="/acceso" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="qr-code" clase="w-6 h-6" /><span>Acceso</span>
    </a>
    <a routerLink="/anamnesis" routerLinkActive="tab-activa" class="tab">
      <app-icono nombre="clipboard" clase="w-6 h-6" /><span>Evaluación</span>
    </a>
  </nav>
}
